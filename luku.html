<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luku Designs Management</title>
    
    <!-- Dynamic PWA Manifest Link -->
    <link id="manifest-link" rel="manifest" href="">
    <meta name="theme-color" content="#1e3a8a">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 
                            50: '#eff6ff', 
                            100: '#dbeafe', 
                            500: '#3b82f6', 
                            600: '#2563eb', 
                            700: '#1d4ed8', 
                            900: '#1e3a8a' 
                        }
                    }
                }
            }
        }
    </script>

    <!-- External Icons & PDF Generators -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-enter { animation: modalEnter 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 1rem; border-radius: 0.75rem; background: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: flex; align-items: center; gap: 0.75rem; animation: slideInRight 0.25s cubic-bezier(0.16, 1, 0.3, 1); min-width: 280px; }
        .toast.dark { background: #1f2937; color: white; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-200 antialiased h-screen overflow-hidden flex flex-col">

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md modal-enter border border-gray-100 dark:border-gray-700">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i data-lucide="shopping-bag" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Luku Designs</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2">Business Management System</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username (admin / staff)</label>
                    <input type="text" id="username" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none" placeholder="Enter admin or staff" required autocomplete="username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password (admin / staff)</label>
                    <input type="password" id="password" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-md">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Main App Layout (Hidden by default) -->
    <div id="app-screen" class="hidden h-full flex flex-col md:flex-row">
        
        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 h-full">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3">
                <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center shadow-md">
                    <i data-lucide="shopping-bag" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg text-gray-900 dark:text-white">Luku Designs</h2>
                    <p id="user-role-display" class="text-xs text-primary-600 dark:text-primary-400 font-bold uppercase tracking-wider"></p>
                </div>
            </div>
            
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="desktop-nav"></nav>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button id="theme-toggle" class="flex items-center gap-3 w-full px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    Toggle Theme
                </button>
                <button onclick="app.logout()" class="flex items-center gap-3 w-full px-3 py-2 mt-2 text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full bg-gray-50 dark:bg-gray-900 relative">
            <!-- Mobile Header -->
            <header class="md:hidden bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex justify-between items-center z-10 shadow-sm">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary-600 rounded-md flex items-center justify-center">
                        <i data-lucide="shopping-bag" class="text-white w-4 h-4"></i>
                    </div>
                    <h2 class="font-bold text-gray-900 dark:text-white">Luku Designs</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="mobile-theme-toggle" class="p-2 text-gray-500 dark:text-gray-400">
                        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button onclick="app.logout()" class="p-2 text-red-500 hover:text-red-600">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 relative">
                <!-- Content injected here -->
            </div>
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 pb-safe z-20 shadow-lg">
            <div class="flex justify-between items-center h-16 px-1 overflow-x-auto hide-scrollbar" id="mobile-nav">
                <!-- Mobile nav injected here -->
            </div>
        </nav>
    </div>

    <!-- Global Modal Overlay -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/55 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto modal-enter p-6 relative">
            <button onclick="ui.closeModal()" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded-full transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // --- 1. Database & State Management ---
        const DB_KEY = 'luku_designs_db';
        
        // Mock historical data generation perfectly spreads over different time milestones (weeks, months, quarters)
        const generateMockDate = (daysAgo) => {
            const date = new Date();
            date.setDate(date.getDate() - daysAgo);
            return date.toISOString();
        };

        const defaultData = {
            settings: { darkMode: false, lastBackup: null, milestoneLevel: 0 },
            customers: [
                { id: 'c1', name: 'Nelly Wanjiku', phone: '0712345678', tiktok: 'nelly_designs', category: 'Frequent Customer', totalOrders: 2, createdAt: generateMockDate(15) },
                { id: 'c2', name: 'Alvin Kiprop', phone: '0722998877', tiktok: 'alvin_thrift', category: 'Trusted Customer', totalOrders: 2, createdAt: generateMockDate(10) },
                { id: 'c3', name: 'Zahra Omar', phone: '0733554433', tiktok: 'zahrakuku', category: 'Normal', totalOrders: 1, createdAt: generateMockDate(5) }
            ],
            categories: ['Dresses', '2-Piece Sets', 'Kimonos', 'Jumpsuits'],
            products: [
                { id: 'p1', category: 'Dresses', name: 'Silk Slip Dress', buyingPrice: 500, sellingPrice: 1500, stock: 12 },
                { id: 'p2', category: '2-Piece Sets', name: 'Linen Lounge Set', buyingPrice: 800, sellingPrice: 2200, stock: 8 },
                { id: 'p3', category: 'Kimonos', name: 'Boho Floral Kimono', buyingPrice: 600, sellingPrice: 1800, stock: 15 },
                { id: 'p4', category: 'Jumpsuits', name: 'Velvet Evening Jumpsuit', buyingPrice: 1000, sellingPrice: 2800, stock: 4 }
            ],
            orders: [
                // Recent orders (Daily/Weekly tab)
                { id: 'o1', date: generateMockDate(6), customerId: 'c1', customerName: 'Nelly Wanjiku', customerPhone: '0712345678', productId: 'p1', productName: 'Silk Slip Dress', productCategory: 'Dresses', quantity: 1, sellingPrice: 1500, buyingPrice: 500, totalValue: 1500, destination: 'Thika', courier: 'Super 2D Sacco', paid: 1500, balance: 0, paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(5) },
                { id: 'o2', date: generateMockDate(4), customerId: 'c2', customerName: 'Alvin Kiprop', customerPhone: '0722998877', productId: 'p2', productName: 'Linen Lounge Set', productCategory: '2-Piece Sets', quantity: 1, sellingPrice: 2200, buyingPrice: 800, totalValue: 2200, destination: 'Eldoret', courier: 'North Rift Shuttle', paid: 1200, balance: 1000, paymentStatus: 'Partially Paid', deliveryStatus: 'Pending Delivery', collectionStatus: 'Awaiting Collection', updatedAt: generateMockDate(4) },
                { id: 'o3', date: generateMockDate(2), customerId: 'c1', customerName: 'Nelly Wanjiku', customerPhone: '0712345678', productId: 'p3', productName: 'Boho Floral Kimono', productCategory: 'Kimonos', quantity: 2, sellingPrice: 1800, buyingPrice: 600, totalValue: 3600, destination: 'Nairobi CBD', courier: 'Rider Direct', paid: 3600, balance: 0, paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(2) },
                // Historical orders (Monthly/Quarterly tab)
                { id: 'o4', date: generateMockDate(20), customerId: 'c3', customerName: 'Zahra Omar', customerPhone: '0733554433', productId: 'p4', productName: 'Velvet Evening Jumpsuit', productCategory: 'Jumpsuits', quantity: 1, sellingPrice: 2800, buyingPrice: 1000, totalValue: 2800, destination: 'Mombasa', courier: 'F经典 Sacco', paid: 2800, balance: 0, paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(18) },
                { id: 'o5', date: generateMockDate(45), customerId: 'c3', customerName: 'Zahra Omar', customerPhone: '0733554433', productId: 'p1', productName: 'Silk Slip Dress', productCategory: 'Dresses', quantity: 3, sellingPrice: 1500, buyingPrice: 500, totalValue: 4500, destination: 'Nairobi', courier: 'Rider Direct', paid: 4500, balance: 0, paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(42) },
                { id: 'o6', date: generateMockDate(110), customerId: 'c1', customerName: 'Nelly Wanjiku', customerPhone: '0712345678', productId: 'p4', productName: 'Velvet Evening Jumpsuit', productCategory: 'Jumpsuits', quantity: 2, sellingPrice: 2800, buyingPrice: 1000, totalValue: 5600, destination: 'Thika', courier: 'Super 2D Sacco', paid: 5600, balance: 0, paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(100) },
                { id: 'o7', date: generateMockDate(250), customerId: 'c2', customerName: 'Alvin Kiprop', customerPhone: '0722998877', productId: 'p3', productName: 'Boho Floral Kimono', productCategory: 'Kimonos', quantity: 4, sellingPrice: 1800, buyingPrice: 600, totalValue: 7200, destination: 'Eldoret', courier: 'North Rift Shuttle', paid: 7200, balance: 0, paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(248) }
            ],
            destinations: ['Thika', 'Eldoret', 'Nairobi CBD', 'Mombasa', 'Kisumu', 'Nakuru'],
            couriers: ['Super 2D Sacco', 'North Rift Shuttle', 'Rider Direct', 'F经典 Sacco'],
            goals: [
                { id: 'g1', type: 'Revenue', target: 50000, title: 'Monthly Revenue Goal' }
            ]
        };

        const db = {
            data: {},
            init() {
                const stored = localStorage.getItem(DB_KEY);
                this.data = stored ? JSON.parse(stored) : defaultData;
                this.save();
            },
            save() {
                localStorage.setItem(DB_KEY, JSON.stringify(this.data));
                lucide.createIcons();
            },
            get(collection) { return this.data[collection] || []; },
            add(collection, item) {
                item.id = Date.now().toString() + Math.random().toString(36).substring(2, 7);
                item.createdAt = new Date().toISOString();
                this.data[collection].push(item);
                this.save();
                return item;
            },
            update(collection, id, updates) {
                const index = this.data[collection].findIndex(i => i.id === id);
                if (index > -1) {
                    this.data[collection][index] = { 
                        ...this.data[collection][index], 
                        ...updates, 
                        updatedAt: new Date().toISOString() 
                    };
                    this.save();
                }
            },
            delete(collection, id) {
                this.data[collection] = this.data[collection].filter(i => i.id !== id);
                this.save();
            }
        };

        // --- 2. UI Helpers & Framework ---
        const ui = {
            currentView: 'dashboard',
            toast(message, type = 'success') {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                const isDark = document.documentElement.classList.contains('dark');
                
                let borderCol = 'border-green-500';
                let iconName = 'check-circle';
                let iconColor = 'text-green-500';
                
                if (type === 'error') {
                    borderCol = 'border-red-500';
                    iconName = 'alert-triangle';
                    iconColor = 'text-red-500';
                } else if (type === 'info') {
                    borderCol = 'border-blue-500';
                    iconName = 'info';
                    iconColor = 'text-blue-500';
                }

                t.className = `toast ${isDark ? 'dark' : ''} border-l-4 ${borderCol}`;
                t.innerHTML = `
                    <i data-lucide="${iconName}" class="${iconColor} w-5 h-5 flex-shrink-0"></i>
                    <span class="text-sm font-semibold">${message}</span>
                `;
                container.appendChild(t);
                lucide.createIcons({root: t});
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translateX(100%)';
                    setTimeout(() => t.remove(), 300);
                }, 3500);
            },
            openModal(html) {
                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal-overlay').classList.remove('hidden');
                lucide.createIcons();
            },
            closeModal() {
                document.getElementById('modal-overlay').classList.add('hidden');
            },
            formatMoney(amount) {
                return new Intl.NumberFormat('en-KE', { style: 'currency', currency: 'KES', minimumFractionDigits: 0 }).format(amount);
            },
            formatDate(isoString) {
                if(!isoString) return 'N/A';
                return new Date(isoString).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            },
            celebrate() {
                confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#2563eb', '#10b981', '#ffffff', '#1d4ed8'] });
            }
        };

        const app = {
            currentUser: null,
            graphPeriod: 'daily', // Default graph tab state
            init() {
                db.init();
                const session = sessionStorage.getItem('luku_session');
                if (session) {
                    this.currentUser = JSON.parse(session);
                    this.showMainApp();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                }
                
                const isDark = db.data.settings.darkMode;
                if(isDark) document.documentElement.classList.add('dark');
                
                document.getElementById('theme-toggle').onclick = () => this.toggleTheme();
                document.getElementById('mobile-theme-toggle').onclick = () => this.toggleTheme();
                
                document.getElementById('login-form').onsubmit = (e) => {
                    e.preventDefault();
                    const u = document.getElementById('username').value.trim().toLowerCase();
                    const p = document.getElementById('password').value.trim();
                    if((u === 'admin' && p === 'admin') || (u === 'staff' && p === 'staff')) {
                        this.currentUser = { username: u, role: u };
                        sessionStorage.setItem('luku_session', JSON.stringify(this.currentUser));
                        this.showMainApp();
                        ui.toast(`Welcome back, ${u}!`);
                    } else {
                        ui.toast('Invalid credentials', 'error');
                    }
                };
            },
            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                db.data.settings.darkMode = isDark;
                db.save();
                if(ui.currentView === 'dashboard') renderSVGRevenueGraph('dashboardGraphContainer', this.graphPeriod);
            },
            showMainApp() {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-role-display').innerText = `${this.currentUser.role} Account`;
                this.navigate('dashboard');
                renderNav();
            },
            logout() {
                sessionStorage.removeItem('luku_session');
                this.currentUser = null;
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('login-form').reset();
            },
            navigate(viewId) {
                ui.currentView = viewId;
                renderNav();
                const container = document.getElementById('view-container');
                container.innerHTML = views[viewId]();
                lucide.createIcons();
                
                if (viewId === 'dashboard') {
                    setTimeout(() => renderSVGRevenueGraph('dashboardGraphContainer', this.graphPeriod), 50);
                }
            },
            render() {
                this.navigate(ui.currentView);
            }
        };

        // --- 3. Navigation & Routing ---
        const navItems = [
            { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard', adminOnly: false },
            { id: 'orders', icon: 'shopping-cart', label: 'Orders', adminOnly: false },
            { id: 'deliveries', icon: 'truck', label: 'Deliveries', adminOnly: false },
            { id: 'customers', icon: 'users', label: 'Customers', adminOnly: false },
            { id: 'inventory', icon: 'package', label: 'Inventory', adminOnly: false },
            { id: 'reports', icon: 'bar-chart-3', label: 'Reports', adminOnly: false },
            { id: 'settings', icon: 'settings', label: 'Settings', adminOnly: true }
        ];

        const renderNav = () => {
            const role = app.currentUser ? app.currentUser.role : 'staff';
            const desktopNav = document.getElementById('desktop-nav');
            const mobileNav = document.getElementById('mobile-nav');
            
            let dHtml = '', mHtml = '';
            navItems.forEach(item => {
                if (item.adminOnly && role !== 'admin') return;
                
                const activeClassesDesktop = ui.currentView === item.id 
                    ? 'bg-primary-50 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 border-l-4 border-primary-600' 
                    : 'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800';
                    
                const activeClassesMobile = ui.currentView === item.id 
                    ? 'text-primary-600 dark:text-primary-400 font-bold scale-105' 
                    : 'text-gray-500 dark:text-gray-400';
                
                dHtml += `
                    <a href="#" onclick="app.navigate('${item.id}'); return false;" class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium transition-all ${activeClassesDesktop}">
                        <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        <span class="text-sm">${item.label}</span>
                    </a>
                `;
                
                if (['dashboard', 'orders', 'deliveries', 'customers', 'inventory', 'reports', 'settings'].includes(item.id)) {
                    mHtml += `
                        <a href="#" onclick="app.navigate('${item.id}'); return false;" class="flex flex-col items-center justify-center w-full py-1 transition-all ${activeClassesMobile}">
                            <i data-lucide="${item.icon}" class="w-5.5 h-5.5 mb-0.5"></i>
                            <span class="text-[9px] font-medium tracking-tight">${item.label}</span>
                        </a>
                    `;
                }
            });

            desktopNav.innerHTML = dHtml;
            mobileNav.innerHTML = mHtml;
            lucide.createIcons();
        };

        /**
         * Dynamic, Advanced SVG Line Graph Generator with Time Grouping (Daily, Weekly, Monthly, etc.)
         * Now shows Profit Tooltips alongside Revenue curves!
         */
        const renderSVGRevenueGraph = (containerId, period = 'daily') => {
            const container = document.getElementById(containerId);
            if (!container) return;

            const isDark = document.documentElement.classList.contains('dark');
            const orders = db.get('orders');
            
            const today = new Date();
            const dataPoints = [];
            const labels = [];
            
            // Core Aggregation Engine for Periods
            if (period === 'daily') {
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(today.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const dailyOrders = orders.filter(o => o.date.startsWith(dateStr));
                    
                    const rev = dailyOrders.reduce((sum, o) => sum + o.totalValue, 0);
                    const prof = dailyOrders.reduce((sum, o) => sum + ((o.sellingPrice - o.buyingPrice) * o.quantity), 0);
                    dataPoints.push({ rev, prof });
                    labels.push(d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }));
                }
            } else if (period === 'weekly') {
                for (let i = 6; i >= 0; i--) {
                    const dEnd = new Date(); dEnd.setDate(today.getDate() - i * 7);
                    const dStart = new Date(dEnd); dStart.setDate(dStart.getDate() - 6);
                    const weeklyOrders = orders.filter(o => {
                        const oDate = new Date(o.date);
                        return oDate >= dStart && oDate <= dEnd;
                    });
                    const rev = weeklyOrders.reduce((sum, o) => sum + o.totalValue, 0);
                    const prof = weeklyOrders.reduce((sum, o) => sum + ((o.sellingPrice - o.buyingPrice) * o.quantity), 0);
                    dataPoints.push({ rev, prof });
                    labels.push(`Wk ${7-i}`);
                }
            } else if (period === 'monthly') {
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
                    const monthStr = d.toISOString().substring(0, 7);
                    const monthlyOrders = orders.filter(o => o.date.startsWith(monthStr));
                    const rev = monthlyOrders.reduce((sum, o) => sum + o.totalValue, 0);
                    const prof = monthlyOrders.reduce((sum, o) => sum + ((o.sellingPrice - o.buyingPrice) * o.quantity), 0);
                    dataPoints.push({ rev, prof });
                    labels.push(d.toLocaleDateString('en-GB', { month: 'short' }));
                }
            } else if (period === 'quarterly') {
                for (let i = 3; i >= 0; i--) {
                    const d = new Date(today.getFullYear(), today.getMonth() - i * 3, 1);
                    const qStart = new Date(d.getFullYear(), Math.floor(d.getMonth() / 3) * 3, 1);
                    const qEnd = new Date(qStart.getFullYear(), qStart.getMonth() + 3, 0);
                    const qOrders = orders.filter(o => {
                        const oDate = new Date(o.date);
                        return oDate >= qStart && oDate <= qEnd;
                    });
                    const rev = qOrders.reduce((sum, o) => sum + o.totalValue, 0);
                    const prof = qOrders.reduce((sum, o) => sum + ((o.sellingPrice - o.buyingPrice) * o.quantity), 0);
                    dataPoints.push({ rev, prof });
                    labels.push(`Q${Math.floor(d.getMonth() / 3) + 1} '${String(d.getFullYear()).slice(2)}`);
                }
            } else if (period === 'yearly') {
                for (let i = 4; i >= 0; i--) {
                    const year = today.getFullYear() - i;
                    const yOrders = orders.filter(o => o.date.startsWith(year.toString()));
                    const rev = yOrders.reduce((sum, o) => sum + o.totalValue, 0);
                    const prof = yOrders.reduce((sum, o) => sum + ((o.sellingPrice - o.buyingPrice) * o.quantity), 0);
                    dataPoints.push({ rev, prof });
                    labels.push(year.toString());
                }
            }

            const revenueMap = dataPoints.map(dp => dp.rev);
            const maxRev = Math.max(...revenueMap, 5000); 
            const gridMax = Math.ceil(maxRev / 1000) * 1000;

            const width = 600;
            const height = 220;
            const paddingLeft = 50;
            const paddingRight = 20;
            const paddingTop = 20;
            const paddingBottom = 30;

            const graphWidth = width - paddingLeft - paddingRight;
            const graphHeight = height - paddingTop - paddingBottom;
            
            const numPoints = dataPoints.length;
            const getX = (index) => paddingLeft + (index / (numPoints - 1)) * graphWidth;
            const getY = (val) => paddingTop + graphHeight - (val / gridMax) * graphHeight;

            let yGridHtml = '';
            const steps = 4;
            for (let i = 0; i <= steps; i++) {
                const currentVal = (gridMax / steps) * i;
                const yCoord = getY(currentVal);
                yGridHtml += `
                    <line x1="${paddingLeft}" y1="${yCoord}" x2="${width - paddingRight}" y2="${yCoord}" stroke="${isDark ? '#374151' : '#e5e7eb'}" stroke-dasharray="3,3" />
                    <text x="${paddingLeft - 8}" y="${yCoord + 4}" text-anchor="end" class="text-[10px]" fill="${isDark ? '#9ca3af' : '#6b7280'}">${currentVal >= 1000 ? (currentVal/1000) + 'k' : currentVal}</text>
                `;
            }

            let xLabelsHtml = '';
            labels.forEach((label, idx) => {
                const xCoord = getX(idx);
                xLabelsHtml += `
                    <text x="${xCoord}" y="${height - 10}" text-anchor="middle" class="text-[9px] font-medium" fill="${isDark ? '#9ca3af' : '#6b7280'}">${label}</text>
                `;
            });

            let pathD = '';
            let areaD = `M ${getX(0)} ${getY(0)}`;
            
            revenueMap.forEach((val, idx) => {
                const cx = getX(idx);
                const cy = getY(val);
                if (idx === 0) {
                    pathD += `M ${cx} ${cy}`;
                    areaD = `M ${cx} ${getY(0)} L ${cx} ${cy}`;
                } else {
                    const prevX = getX(idx - 1);
                    const prevY = getY(revenueMap[idx - 1]);
                    const cpX1 = prevX + (cx - prevX) / 2;
                    pathD += ` C ${cpX1} ${prevY}, ${cpX1} ${cy}, ${cx} ${cy}`;
                    areaD += ` C ${cpX1} ${prevY}, ${cpX1} ${cy}, ${cx} ${cy}`;

                circlesHtml += `

                            <text x="${cx}" y="${cy - 20}" text-anchor="middle" font-size="9" fill="#34d399" font-weight="bold">Profit: KSh ${dp.prof.toLocaleString()}</text>

                                <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
                            </linearGradient>

                        ${yGridHtml}
                        <path d="${areaD}" fill="url(#chartGradient)" />
                        <path d="${pathD}" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                        ${circlesHtml}
                        ${xLabelsHtml}
                    </svg>

            `;

                    totalRevenue += o.totalValue;
                    totalCOGS += (o.buyingPrice * o.quantity);
                    totalItemsSold += o.quantity;
                });

                const grossProfit = totalRevenue - totalCOGS;
                const netMargin = totalRevenue > 0 ? (grossProfit / totalRevenue) * 100 : 0;
                
                const totalAssetValue = products.reduce((sum, p) => sum + (p.buyingPrice * p.stock), 0);
                const potentialAssetRev = products.reduce((sum, p) => sum + (p.sellingPrice * p.stock), 0);

        const actions = {

            // Customer Actions
            openAddCustomerModal() {
                ui.openModal(`

                                <option value="Normal">Normal Client</option>
                                <option value="Frequent Customer">Frequent Customer</option>
                                <option value="Trusted Customer">Trusted Customer (Eligible for credit)</option>
                                <option value="Problematic Customer">Problematic Customer</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white p-3.5 rounded-xl font-bold mt-4 shadow-md transition-colors">
                            Save Client Profile
                        </button>
                    </form>
                `);
                document.getElementById('add-customer-form').onsubmit = (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    const phone = fd.get('phone').trim();
                    
                    if(db.get('customers').some(c => c.phone === phone)) {
                        return ui.toast('Customer with this phone already exists!', 'error');
                    }

                    db.add('customers', {
                        name: fd.get('name').trim(),
                        phone,
                        tiktok: fd.get('tiktok').trim(),
                        category: fd.get('category'),
                        totalOrders: 0
                    });

                    const cust = customers.find(c => c.id === fd.get('customerId'));

                    const paid = Number(fd.get('paid'));
                    
                    if(qty > prod.stock) return ui.toast(`Only ${prod.stock} items left in stock.`, 'error');
                    
                    const totalValue = prod.sellingPrice * qty;
                    const balance = totalValue - paid;
                    const paymentStatus = balance <= 0 ? 'Fully Paid' : (paid > 0 ? 'Partially Paid' : 'Unpaid');
                    
                    const dest = fd.get('destination').trim();
                    let destList = db.get('destinations');

                        collectionStatus: 'Awaiting Collection'
                    });

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db.data));

                dlAnchorElem.setAttribute("href", dataStr);

            importData(e) {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if(parsed && parsed.orders && parsed.products) {
                            localStorage.setItem(DB_KEY, JSON.stringify(parsed));
                            db.init();
                            ui.toast('All records successfully restored!');
                            app.render();
                        } else {
                            throw new Error('Invalid system metadata');
                        }
                    } catch(err) {
                        ui.toast('Unsupported file format structure.', 'error');
                    }
                };
                reader.readAsText(file);
            },

            wipeSystemStorage() {
                localStorage.removeItem(DB_KEY);
                ui.toast('Storage cleared successfully.');
                location.reload();
            },

            downloadCSV() {

                let csvContent = "data:text/csv;charset=utf-8,";

                orders.forEach(o => {
                    const row = [
                        new Date(o.date).toLocaleDateString(),
                        `"${o.customerName}"`,
                        `"${o.productName}"`,
                        o.quantity,
                        o.sellingPrice,
                        o.totalValue,
                        o.paymentStatus
                    ].join(",");
                    csvContent += row + "\n";
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Luku_Orders_${new Date().getTime()}.csv`);

                link.click();

            downloadPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                const orders = db.get('orders');
                const products = db.get('products');
                const customers = db.get('customers');

                let rev = 0;
                let cogs = 0;
                orders.forEach(o => {
                    rev += o.totalValue;
                    cogs += (o.buyingPrice * o.quantity);
                });
                const profit = rev - cogs;

                // Headers
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(22);
                doc.setTextColor(30, 58, 138);
                doc.text("LUKU DESIGNS SYSTEM STATEMENT", 20, 24);

                doc.setFont("Helvetica", "normal");
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139);
                doc.text(`Generated on: ${new Date().toLocaleString()}`, 20, 32);
                doc.text(`Total Accounts: ${customers.length} | Catalog SKU Items: ${products.length}`, 20, 38);

                doc.setDrawColor(226, 232, 240);
                doc.line(20, 44, 190, 44);

                // Financial Overview
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(14);
                doc.setTextColor(15, 23, 42);
                doc.text("1. Executive Summary", 20, 54);

                doc.setFont("Helvetica", "normal");
                doc.setFontSize(11);
                doc.text(`A. Gross Sales Revenue:      KES ${rev.toLocaleString()}`, 25, 64);
                doc.text(`B. Cost of Goods Sold:       KES ${cogs.toLocaleString()}`, 25, 72);
                
                doc.setFont("Helvetica", "bold");
                doc.setTextColor(16, 185, 129);
                doc.text(`C. Calculated Net Profit:    KES ${profit.toLocaleString()}`, 25, 80);

                doc.setFont("Helvetica", "normal");
                doc.setTextColor(15, 23, 42);
                doc.text(`D. Store Performance Margin:  ${rev > 0 ? Math.round((profit/rev)*100) : 0}%`, 25, 88);

                doc.setDrawColor(226, 232, 240);
                doc.line(20, 96, 190, 96);

                // Inventory Valuation Summary
                doc.setFont("Helvetica", "bold");
                doc.text("2. Product Catalog Breakdown", 20, 106);

                let yCoord = 118;
                doc.setFontSize(9);
                doc.setTextColor(100, 116, 139);
                doc.text("Product Item", 22, yCoord);
                doc.text("Category", 75, yCoord);
                doc.text("Stock", 115, yCoord);
                doc.text("Cost Price", 135, yCoord);
                doc.text("Valuation", 165, yCoord);
                
                doc.line(20, yCoord + 2, 190, yCoord + 2);
                yCoord += 10;

                doc.setFont("Helvetica", "normal");
                doc.setTextColor(15, 23, 42);
                
                // Fixed Code Block for PDF generation continuation
                products.forEach(p => {
                    if (yCoord < 270) {
                        doc.text(p.name.substring(0, 26), 22, yCoord);
                        doc.text(p.category, 75, yCoord);
                        doc.text(`${p.stock} units`, 115, yCoord);
                        doc.text(ui.formatMoney(p.buyingPrice), 135, yCoord);
                        doc.text(ui.formatMoney(p.buyingPrice * p.stock), 165, yCoord);
                        yCoord += 8;
                    }
                });
                
                doc.save(`Luku_Designs_Report_${new Date().getTime()}.pdf`);
                ui.toast('PDF Downloaded successfully!');
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
