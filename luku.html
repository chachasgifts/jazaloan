<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luku Designs Management</title>
    
    <!-- Dynamic PWA Manifest Link -->
    <link id="manifest-link" rel="manifest" href="">
    <meta name="theme-color" content="#1e3a8a">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>

    <!-- External Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Custom Styles & Animations */
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-enter { animation: modalEnter 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 1rem; border-radius: 0.5rem; background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); display: flex; align-items: center; gap: 0.5rem; animation: slideInRight 0.3s ease-out; }
        .toast.dark { background: #1f2937; color: white; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-200 antialiased h-screen overflow-hidden flex flex-col">

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md modal-enter border border-gray-100 dark:border-gray-700">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i data-lucide="shopping-bag" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Luku Designs</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2">Business Management System</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username (admin / staff)</label>
                    <input type="text" id="username" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password (admin / staff)</label>
                    <input type="password" id="password" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg transition-colors">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Main App Layout (Hidden by default) -->
    <div id="app-screen" class="hidden h-full flex flex-col md:flex-row">
        
        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 h-full">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3">
                <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center shadow-md">
                    <i data-lucide="shopping-bag" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg text-gray-900 dark:text-white">Luku Designs</h2>
                    <p id="user-role-display" class="text-xs text-primary-600 dark:text-primary-400 font-medium uppercase"></p>
                </div>
            </div>
            
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="desktop-nav"></nav>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button id="theme-toggle" class="flex items-center gap-3 w-full px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    Toggle Theme
                </button>
                <button onclick="app.logout()" class="flex items-center gap-3 w-full px-3 py-2 mt-2 text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full bg-gray-50 dark:bg-gray-900 relative">
            <!-- Mobile Header -->
            <header class="md:hidden bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex justify-between items-center z-10">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary-600 rounded-md flex items-center justify-center">
                        <i data-lucide="shopping-bag" class="text-white w-4 h-4"></i>
                    </div>
                    <h2 class="font-bold text-gray-900 dark:text-white">Luku Designs</h2>
                </div>
                <button onclick="app.logout()" class="p-2 text-gray-500 hover:text-red-500">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 relative">
                <!-- Content injected here -->
            </div>
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 pb-safe z-20">
            <div class="flex justify-around items-center h-16 px-2" id="mobile-nav">
                <!-- Mobile nav injected here -->
            </div>
        </nav>
    </div>

    <!-- Global Modal Overlay -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto modal-enter p-6 relative">
            <button onclick="ui.closeModal()" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded-full">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        /**
         * LUKU DESIGNS - Core Application Logic
         * PWA & Offline Support built-in.
         */

        // --- 1. Dynamic PWA Generation ---
        const generatePWA = () => {
            const manifest = {
                name: "Luku Designs Thrift ERP",
                short_name: "Luku",
                description: "Business management system for Luku Designs",
                start_url: ".",
                display: "standalone",
                background_color: "#ffffff",
                theme_color: "#1e3a8a",
                icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231e3a8a'%3E%3Cpath d='M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z'/%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" }]
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

            // Inline Service Worker for true offline capability without extra files
            const swCode = `
                const CACHE_NAME = 'luku-v1';
                self.addEventListener('install', e => { self.skipWaiting(); });
                self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
                self.addEventListener('fetch', e => {
                    e.respondWith(
                        caches.match(e.request).then(res => {
                            if (res) return res;
                            return fetch(e.request).then(fetchRes => {
                                // Cache dynamic CDNs for offline use
                                if(e.request.url.startsWith('https://')) {
                                    return caches.open(CACHE_NAME).then(cache => {
                                        cache.put(e.request, fetchRes.clone());
                                        return fetchRes;
                                    });
                                }
                                return fetchRes;
                            }).catch(() => new Response('Offline'));
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration failed:', err));
            }
        };

        // --- 2. Database & State Management ---
        const DB_KEY = 'luku_designs_db';
        const defaultData = {
            settings: { darkMode: false, lastBackup: null, milestoneLevel: 0 },
            customers: [],
            categories: ['Dresses', '2-Piece Sets', 'Kimonos', 'Jumpsuits'],
            products: [
                { id: 'p1', category: 'Dresses', name: 'Silk Slip Dress', buyingPrice: 500, sellingPrice: 1500, stock: 10 },
                { id: 'p2', category: '2-Piece Sets', name: 'Linen Lounge Set', buyingPrice: 800, sellingPrice: 2200, stock: 5 }
            ],
            orders: [],
            destinations: [],
            couriers: [],
            goals: [
                { id: 'g1', type: 'Revenue', target: 50000, title: 'Monthly Revenue' }
            ]
        };

        const db = {
            data: {},
            init() {
                const stored = localStorage.getItem(DB_KEY);
                this.data = stored ? JSON.parse(stored) : defaultData;
                this.save();
            },
            save() {
                localStorage.setItem(DB_KEY, JSON.stringify(this.data));
                lucide.createIcons();
            },
            get(collection) { return this.data[collection] || []; },
            add(collection, item) {
                item.id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                item.createdAt = new Date().toISOString();
                this.data[collection].push(item);
                this.save();
                return item;
            },
            update(collection, id, updates) {
                const index = this.data[collection].findIndex(i => i.id === id);
                if (index > -1) {
                    this.data[collection][index] = { ...this.data[collection][index], ...updates, updatedAt: new Date().toISOString() };
                    this.save();
                }
            },
            delete(collection, id) {
                if(app.currentUser.role !== 'admin') return ui.toast('Admin access required to delete.', 'error');
                this.data[collection] = this.data[collection].filter(i => i.id !== id);
                this.save();
            }
        };

        // --- 3. UI Helpers & Framework ---
        const ui = {
            currentView: 'dashboard',
            toast(message, type = 'success') {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                const isDark = document.documentElement.classList.contains('dark');
                t.className = `toast ${isDark ? 'dark' : ''} border-l-4 ${type === 'success' ? 'border-green-500' : type==='error' ? 'border-red-500' : 'border-blue-500'}`;
                t.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : type==='error'?'alert-circle':'info'}" class="${type === 'success' ? 'text-green-500' : type==='error' ? 'text-red-500' : 'text-blue-500'}"></i>
                               <span class="text-sm font-medium">${message}</span>`;
                container.appendChild(t);
                lucide.createIcons({root: t});
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translateX(100%)';
                    setTimeout(() => t.remove(), 300);
                }, 3000);
            },
            openModal(html) {
                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal-overlay').classList.remove('hidden');
                lucide.createIcons();
            },
            closeModal() {
                document.getElementById('modal-overlay').classList.add('hidden');
            },
            formatMoney(amount) {
                return new Intl.NumberFormat('en-KE', { style: 'currency', currency: 'KES', minimumFractionDigits: 0 }).format(amount);
            },
            formatDate(isoString) {
                if(!isoString) return 'N/A';
                return new Date(isoString).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            },
            celebrate() {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#2563eb', '#ffffff', '#1d4ed8'] });
            }
        };

        // --- 4. Navigation & Routing ---
        const navItems = [
            { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard', adminOnly: false },
            { id: 'orders', icon: 'shopping-cart', label: 'Orders', adminOnly: false },
            { id: 'deliveries', icon: 'truck', label: 'Deliveries', adminOnly: false },
            { id: 'customers', icon: 'users', label: 'Customers', adminOnly: false },
            { id: 'inventory', icon: 'package', label: 'Inventory', adminOnly: false },
            { id: 'reports', icon: 'bar-chart-2', label: 'Reports', adminOnly: true },
            { id: 'settings', icon: 'settings', label: 'Settings', adminOnly: true }
        ];

        const renderNav = () => {
            const role = app.currentUser.role;
            const desktopNav = document.getElementById('desktop-nav');
            const mobileNav = document.getElementById('mobile-nav');
            
            let dHtml = '', mHtml = '';
            navItems.forEach(item => {
                if (item.adminOnly && role !== 'admin') return;
                const activeClassesDesktop = ui.currentView === item.id ? 'bg-primary-50 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800';
                const activeClassesMobile = ui.currentView === item.id ? 'text-primary-600 dark:text-primary-400' : 'text-gray-500 dark:text-gray-400';
                
                dHtml += `
                    <a href="#" onclick="app.navigate('${item.id}'); return false;" class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium transition-colors ${activeClassesDesktop}">
                        <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        ${item.label}
                    </a>
                `;
                // Limit mobile nav items for space
                if (['dashboard', 'orders', 'deliveries', 'customers'].includes(item.id)) {
                    mHtml += `
                        <a href="#" onclick="app.navigate('${item.id}'); return false;" class="flex flex-col items-center justify-center w-full py-2 ${activeClassesMobile}">
                            <i data-lucide="${item.icon}" class="w-6 h-6 mb-1"></i>
                            <span class="text-[10px] font-medium">${item.label}</span>
                        </a>
                    `;
                }
            });
            
            // Add menu trigger for mobile for extra items
            mHtml += `
                <a href="#" onclick="app.navigate('inventory'); return false;" class="flex flex-col items-center justify-center w-full py-2 ${ui.currentView==='inventory' ? 'text-primary-600 dark:text-primary-400' : 'text-gray-500 dark:text-gray-400'}">
                    <i data-lucide="package" class="w-6 h-6 mb-1"></i>
                    <span class="text-[10px] font-medium">Stock</span>
                </a>
            `;

            desktopNav.innerHTML = dHtml;
            mobileNav.innerHTML = mHtml;
            lucide.createIcons();
        };

        // --- 5. Application Views ---
        const views = {
            dashboard() {
                const orders = db.get('orders');
                const products = db.get('products');
                
                // Analytics Calcs
                let totalProfit = 0;
                let totalRevenue = 0;
                let pendingDeliveries = 0;
                let expiringCollections = 0;

                const today = new Date();
                
                orders.forEach(o => {
                    const oDate = new Date(o.date);
                    const daysSince = Math.floor((today - oDate) / (1000 * 3600 * 24));
                    
                    // Profit & Rev (Simplified all time for demo, normally filtered by date)
                    totalRevenue += o.totalValue;
                    totalProfit += (o.sellingPrice - o.buyingPrice) * o.quantity;

                    if (o.deliveryStatus === 'Pending Delivery') pendingDeliveries++;
                    if (o.collectionStatus === 'Awaiting Collection' && daysSince >= 11) expiringCollections++;
                });

                // Check Milestones
                const currentMilestoneLevel = Math.floor(totalProfit / 10000);
                if (currentMilestoneLevel > db.data.settings.milestoneLevel) {
                    ui.celebrate();
                    ui.toast(`🎉 Milestone Reached! Profit exceeded ${ui.formatMoney(currentMilestoneLevel * 10000)}`, 'success');
                    db.data.settings.milestoneLevel = currentMilestoneLevel;
                    db.save();
                }

                const goals = db.get('goals');
                const revGoal = goals.find(g => g.type === 'Revenue');
                const goalProgress = revGoal ? Math.min((totalRevenue / revGoal.target) * 100, 100) : 0;

                return `
                    <div class="fade-in space-y-6">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-bold">Dashboard</h1>
                            <div class="text-sm text-gray-500 dark:text-gray-400">${new Date().toDateString()}</div>
                        </div>

                        <!-- Stats Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Profit</p>
                                        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mt-1">${ui.formatMoney(totalProfit)}</h3>
                                    </div>
                                    <div class="p-2 bg-green-50 dark:bg-green-900/30 text-green-600 rounded-lg"><i data-lucide="trending-up"></i></div>
                                </div>
                            </div>
                            <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer hover:border-primary-300 transition-colors" onclick="app.navigate('deliveries')">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Pending Deliveries</p>
                                        <h3 class="text-2xl font-bold text-gray-900 dark:text-white mt-1">${pendingDeliveries}</h3>
                                    </div>
                                    <div class="p-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 rounded-lg"><i data-lucide="truck"></i></div>
                                </div>
                            </div>
                            <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Expiring (14-Day)</p>
                                        <h3 class="text-2xl font-bold ${expiringCollections > 0 ? 'text-red-600' : 'text-gray-900 dark:text-white'} mt-1">${expiringCollections}</h3>
                                    </div>
                                    <div class="p-2 bg-red-50 dark:bg-red-900/30 text-red-600 rounded-lg"><i data-lucide="alert-triangle"></i></div>
                                </div>
                            </div>
                            <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Goal Progress</p>
                                        <h3 class="text-xl font-bold text-gray-900 dark:text-white mt-1">${Math.round(goalProgress)}%</h3>
                                    </div>
                                    <div class="p-2 bg-purple-50 dark:bg-purple-900/30 text-purple-600 rounded-lg"><i data-lucide="target"></i></div>
                                </div>
                                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-3">
                                    <div class="bg-purple-600 h-2 rounded-full" style="width: ${goalProgress}%"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Charts & Recent -->
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="lg:col-span-2 bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                                <h3 class="text-lg font-bold mb-4">Revenue Overview</h3>
                                <canvas id="dashboardChart" class="w-full h-64"></canvas>
                            </div>
                            <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                                <h3 class="text-lg font-bold mb-4">Recent Orders</h3>
                                <div class="space-y-4">
                                    ${orders.slice(-5).reverse().map(o => `
                                        <div class="flex justify-between items-center pb-2 border-b border-gray-100 dark:border-gray-700 last:border-0">
                                            <div>
                                                <p class="font-medium text-sm">${o.customerName}</p>
                                                <p class="text-xs text-gray-500">${o.productName}</p>
                                            </div>
                                            <div class="text-right">
                                                <p class="font-bold text-sm text-primary-600">${ui.formatMoney(o.totalValue)}</p>
                                                <span class="text-[10px] px-2 py-0.5 rounded-full ${o.paymentStatus==='Fully Paid'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}">${o.paymentStatus}</span>
                                            </div>
                                        </div>
                                    `).join('') || '<p class="text-sm text-gray-500">No recent orders.</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },
            
            orders() {
                const orders = db.get('orders').slice().reverse();
                const isAdmin = app.currentUser.role === 'admin';
                
                return `
                    <div class="fade-in space-y-4">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-bold">Orders</h1>
                            <button onclick="actions.openAddOrderModal()" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium transition-colors">
                                <i data-lucide="plus" class="w-4 h-4"></i> Add Order
                            </button>
                        </div>
                        
                        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm text-left">
                                    <thead class="bg-gray-50 dark:bg-gray-900/50 text-gray-600 dark:text-gray-400 font-medium border-b border-gray-200 dark:border-gray-700">
                                        <tr>
                                            <th class="px-4 py-3">Date</th>
                                            <th class="px-4 py-3">Customer</th>

                                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700">

                                                if(daysSince >= 14) colClass = 'bg-red-100 text-red-700';
                                                else if(daysSince >= 11) colClass = 'bg-orange-100 text-orange-700';
                                                else colClass = 'bg-blue-100 text-blue-700';
                                            } else if(o.collectionStatus === 'Collected') {
                                                colClass = 'bg-green-100 text-green-700';
                                            }

                                            return `
                                            <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50">
                                                <td class="px-4 py-3">${ui.formatDate(o.date)}</td>
                                                <td class="px-4 py-3 font-medium">${o.customerName}</td>
                                                <td class="px-4 py-3">${o.quantity}x ${o.productName}</td>
                                                <td class="px-4 py-3">${ui.formatMoney(o.totalValue)}</td>
                                                <td class="px-4 py-3 font-medium ${o.balance > 0 ? 'text-red-500' : 'text-green-500'}">${ui.formatMoney(o.balance)}</td>
                                                <td class="px-4 py-3">

                                                </td>
                                                <td class="px-4 py-3">
                                                    <span class="px-2 py-1 rounded-full text-[10px] uppercase font-bold tracking-wider ${colClass}">${o.collectionStatus} ${daysSince>0 && o.collectionStatus==='Awaiting Collection' ? `(${daysSince}d)` : ''}</span>
                                                </td>
                                                <td class="px-4 py-3 text-right">
                                                    <button onclick="actions.openPaymentModal('${o.id}')" class="text-primary-600 hover:text-primary-800 mr-2" title="Add Payment"><i data-lucide="dollar-sign" class="w-4 h-4"></i></button>
                                                    ${isAdmin ? `<button onclick="actions.deleteItem('orders', '${o.id}')" class="text-red-500 hover:text-red-700" title="Delete"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}

            },
            
            deliveries() {
                const orders = db.get('orders');
                const pending = orders.filter(o => o.deliveryStatus === 'Pending Delivery');
                const delivered = orders.filter(o => o.deliveryStatus === 'Delivered');
                
                return `
                    <div class="fade-in space-y-6">
                        <h1 class="text-2xl font-bold">Delivery Management</h1>
                        
                        <div class="grid md:grid-cols-2 gap-6">
                            <!-- Pending -->
                            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-orange-200 dark:border-orange-900 p-5">
                                <h3 class="font-bold text-lg text-orange-600 dark:text-orange-400 mb-4 flex items-center gap-2"><i data-lucide="clock"></i> Pending Deliveries (${pending.length})</h3>
                                <div class="space-y-3 max-h-96 overflow-y-auto pr-2">
                                    ${pending.map(o => `
                                        <div class="p-3 border border-gray-100 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-900/50">
                                            <div class="flex justify-between items-start">
                                                <div>
                                                    <p class="font-bold text-sm">${o.customerName}</p>
                                                    <p class="text-xs text-gray-500">Destination: <span class="font-medium text-gray-700 dark:text-gray-300">${o.destination}</span></p>

                            <!-- Delivered -->
                            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-green-200 dark:border-green-900 p-5">
                                <h3 class="font-bold text-lg text-green-600 dark:text-green-400 mb-4 flex items-center gap-2"><i data-lucide="check-circle"></i> Recently Delivered</h3>
                                <div class="space-y-3 max-h-96 overflow-y-auto pr-2">
                                    ${delivered.slice(-10).reverse().map(o => `
                                        <div class="p-3 border border-gray-100 dark:border-gray-700 rounded-lg">
                                            <p class="font-bold text-sm">${o.customerName}</p>
                                            <p class="text-xs text-gray-500">To: ${o.destination} via ${o.courier}</p>

                            </div>
                        </div>
                    </div>

            },

            inventory() {
                const products = db.get('products');
                return `
                    <div class="fade-in space-y-4">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-bold">Inventory</h1>
                            <button onclick="actions.openAddProductModal()" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
                                <i data-lucide="plus" class="w-4 h-4"></i> Add Product
                            </button>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-gray-50 dark:bg-gray-900/50 text-gray-600 dark:text-gray-400 font-medium border-b border-gray-200 dark:border-gray-700">
                                    <tr>
                                        <th class="px-4 py-3">Product Name</th>
                                        <th class="px-4 py-3">Category</th>
                                        <th class="px-4 py-3">Cost Price</th>
                                        <th class="px-4 py-3">Selling Price</th>
                                        <th class="px-4 py-3">Stock</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                                    ${products.map(p => `
                                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50">
                                            <td class="px-4 py-3 font-medium">${p.name}</td>
                                            <td class="px-4 py-3">
                                                <span class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded-full text-xs">${p.category}</span>
                                            </td>
                                            <td class="px-4 py-3">${ui.formatMoney(p.buyingPrice)}</td>
                                            <td class="px-4 py-3 font-bold text-primary-600">${ui.formatMoney(p.sellingPrice)}</td>

                                                <span class="${p.stock <= 5 ? 'text-red-500 font-bold' : 'text-green-600'}">${p.stock} units</span>

            },

            settings() {
                return `
                    <div class="fade-in space-y-6 max-w-2xl mx-auto">
                        <h1 class="text-2xl font-bold">Admin Settings & Backup</h1>
                        
                        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="database"></i> Data Management</h3>
                            <p class="text-sm text-gray-500 mb-4">Export your business data regularly to prevent loss. All data is stored locally on this device.</p>
                            
                            <div class="flex gap-4">
                                <button onclick="actions.exportData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
                                    <i data-lucide="download" class="w-4 h-4"></i> Backup Data (JSON)
                                </button>
                                <label class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium cursor-pointer transition-colors">
                                    <i data-lucide="upload" class="w-4 h-4"></i> Restore Data
                                    <input type="file" class="hidden" accept=".json" onchange="actions.importData(event)">
                                </label>
                            </div>
                        </div>

                        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="trash-2" class="text-red-500"></i> Danger Zone</h3>
                            <button onclick="if(confirm('Are you absolutely sure? This will delete ALL local data!')) { localStorage.removeItem('${DB_KEY}'); location.reload(); }" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium transition-colors border border-red-200">
                                Reset System (Clear All Data)
                            </button>
                        </div>
                    </div>
                `;
            },
            
            reports() {
                return `
                    <div class="fade-in space-y-6">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-bold">Business Reports</h1>
                            <button onclick="actions.downloadPDF()" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
                                <i data-lucide="file-text" class="w-4 h-4"></i> Download PDF
                            </button>
                        </div>
                        <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <h3 class="font-bold mb-4">Category Performance</h3>
                            <canvas id="categoryChart" class="w-full h-64"></canvas>
                        </div>
                    </div>
                `;
            }
        };

        // --- 6. Business Logic Actions ---
        const actions = {
            openAddCustomerModal() {
                ui.openModal(`
                    <h3 class="text-lg font-bold mb-4">Add New Customer</h3>
                    <form id="add-customer-form" class="space-y-4">
                        <div><label class="text-sm font-medium">Name</label><input type="text" name="name" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        <div><label class="text-sm font-medium">Phone Number</label><input type="tel" name="phone" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        <div><label class="text-sm font-medium">TikTok Username</label><input type="text" name="tiktok" class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        <div>
                            <label class="text-sm font-medium">Category</label>
                            <select name="category" class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                                <option>Normal</option>
                                <option>Trusted Customer</option>
                                <option>Frequent Customer</option>
                                <option>Problematic Customer</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-primary-600 text-white p-2 rounded-lg font-medium mt-4">Save Customer</button>
                    </form>
                `);
                document.getElementById('add-customer-form').onsubmit = (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    const phone = fd.get('phone');
                    
                    // Deduplication rule
                    if(db.get('customers').some(c => c.phone === phone)) {
                        return ui.toast('Customer with this phone already exists!', 'error');
                    }

                    db.add('customers', {
                        name: fd.get('name'), phone, tiktok: fd.get('tiktok'), category: fd.get('category'), totalOrders: 0
                    });
                    ui.closeModal();
                    ui.toast('Customer added successfully');
                    app.render();
                };
            },

            openAddProductModal() {
                const cats = db.get('categories').map(c => `<option value="${c}">${c}</option>`).join('');
                ui.openModal(`
                    <h3 class="text-lg font-bold mb-4">Add New Product</h3>
                    <form id="add-product-form" class="space-y-4">
                        <div><label class="text-sm font-medium">Product Name</label><input type="text" name="name" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        <div><label class="text-sm font-medium">Category</label><select name="category" class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">${cats}</select></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-sm font-medium">Buying Price</label><input type="number" name="buyingPrice" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                            <div><label class="text-sm font-medium">Selling Price</label><input type="number" name="sellingPrice" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        </div>
                        <div><label class="text-sm font-medium">Initial Stock</label><input type="number" name="stock" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        <button type="submit" class="w-full bg-primary-600 text-white p-2 rounded-lg font-medium mt-4">Save Product</button>
                    </form>
                `);
                document.getElementById('add-product-form').onsubmit = (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    db.add('products', {
                        name: fd.get('name'), category: fd.get('category'),
                        buyingPrice: Number(fd.get('buyingPrice')), sellingPrice: Number(fd.get('sellingPrice')), stock: Number(fd.get('stock'))
                    });
                    ui.closeModal();
                    ui.toast('Product added successfully');
                    app.render();
                };
            },

            openAddOrderModal() {
                const customers = db.get('customers');
                const products = db.get('products').filter(p => p.stock > 0);
                
                if(customers.length === 0) return ui.toast('Please add a customer first.', 'error');
                if(products.length === 0) return ui.toast('Please add products in stock first.', 'error');

                ui.openModal(`
                    <h3 class="text-lg font-bold mb-4">Create New Order</h3>
                    <form id="add-order-form" class="space-y-4">
                        <div>
                            <label class="text-sm font-medium">Customer</label>
                            <select name="customerId" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                                ${customers.map(c => `<option value="${c.id}">${c.name} (${c.phone})</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="text-sm font-medium">Product</label>
                            <select name="productId" required id="product-select" class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                                ${products.map(p => `<option value="${p.id}" data-price="${p.sellingPrice}">${p.name} (Stock: ${p.stock}) - ${ui.formatMoney(p.sellingPrice)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-sm font-medium">Quantity</label><input type="number" name="quantity" id="order-qty" value="1" min="1" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                            <div><label class="text-sm font-medium">Initial Payment</label><input type="number" name="paid" value="0" min="0" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-sm font-medium">Destination Town/Market</label><input type="text" name="destination" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" list="dest-list"></div>
                            <div><label class="text-sm font-medium">Courier/Sacco</label><input type="text" name="courier" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"></div>
                        </div>
                        <datalist id="dest-list">${db.get('destinations').map(d => `<option value="${d}">`).join('')}</datalist>
                        
                        <div class="bg-gray-50 dark:bg-gray-900 p-3 rounded-lg border border-gray-200 dark:border-gray-700 text-sm flex justify-between">
                            <span>Total Value:</span><strong id="order-total">KSh 0</strong>
                        </div>
                        <button type="submit" class="w-full bg-primary-600 text-white p-2 rounded-lg font-medium mt-4">Place Order</button>
                    </form>
                `);

                const pSelect = document.getElementById('product-select');
                const qInput = document.getElementById('order-qty');
                const tDisp = document.getElementById('order-total');
                
                const updateTotal = () => {
                    const price = Number(pSelect.options[pSelect.selectedIndex].dataset.price);
                    tDisp.innerText = ui.formatMoney(price * Number(qInput.value));
                };
                pSelect.onchange = updateTotal;
                qInput.oninput = updateTotal;
                updateTotal();

                document.getElementById('add-order-form').onsubmit = (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    
                    const prod = products.find(p => p.id === fd.get('productId'));
                    const cust = customers.find(c => c.id === fd.get('customerId'));
                    const qty = Number(fd.get('quantity'));
                    const paid = Number(fd.get('paid'));
                    
                    if(qty > prod.stock) return ui.toast(`Only ${prod.stock} items left in stock.`, 'error');
                    
                    const totalValue = prod.sellingPrice * qty;
                    const balance = totalValue - paid;
                    const paymentStatus = balance <= 0 ? 'Fully Paid' : (paid > 0 ? 'Partially Paid' : 'Unpaid');
                    
                    // Destination Unlock check
                    const dest = fd.get('destination').trim();
                    let destList = db.get('destinations');
                    if(!destList.includes(dest)) {
                        destList.push(dest);
                        db.save();
                        setTimeout(() => {
                            ui.celebrate();
                            ui.toast(`🎉 New Destination Unlocked: ${dest}!`, 'success');
                        }, 500);
                    }

                    // Process Order
                    db.add('orders', {
                        date: new Date().toISOString(),
                        customerId: cust.id, customerName: cust.name, customerPhone: cust.phone,
                        productId: prod.id, productName: prod.name, productCategory: prod.category,
                        quantity: qty, sellingPrice: prod.sellingPrice, buyingPrice: prod.buyingPrice, totalValue,
                        destination: dest, courier: fd.get('courier'),
                        paid, balance, paymentStatus,
                        deliveryStatus: 'Pending Delivery', collectionStatus: 'Awaiting Collection'
                    });

                    // Deduct stock
                    db.update('products', prod.id, { stock: prod.stock - qty });
                    
                    // Update customer stats
                    db.update('customers', cust.id, { totalOrders: (cust.totalOrders || 0) + 1 });

                    ui.closeModal();
                    ui.toast('Order placed successfully');
                    app.render();
                };
            },

            openPaymentModal(orderId) {
                const order = db.get('orders').find(o => o.id === orderId);
                if(order.balance <= 0) return ui.toast('This order is already fully paid.', 'info');
                
                ui.openModal(`
                    <h3 class="text-lg font-bold mb-2">Record Installment Payment</h3>
                    <p class="text-sm text-gray-500 mb-4">Customer: ${order.customerName} | Balance: <strong class="text-red-500">${ui.formatMoney(order.balance)}</strong></p>
                    
                    <form id="payment-form">
                        <div>
                            <label class="text-sm font-medium">Amount Paid Now</label>
                            <input type="number" name="amount" max="${order.balance}" required class="w-full mt-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                        </div>
                        <button type="submit" class="w-full bg-green-600 text-white p-2 rounded-lg font-medium mt-4">Confirm Payment</button>
                    </form>
                `);

                document.getElementById('payment-form').onsubmit = (e) => {
                    e.preventDefault();
                    const amt = Number(new FormData(e.target).get('amount'));
                    
                    const newPaid = order.paid + amt;
                    const newBalance = order.totalValue - newPaid;
                    const status = newBalance <= 0 ? 'Fully Paid' : 'Partially Paid';
                    
                    db.update('orders', orderId, { paid: newPaid, balance: newBalance, paymentStatus: status });
                    
                    ui.closeModal();
                    ui.toast('Payment recorded successfully');
                    app.render();
                };
            },

            markDelivered(orderId) {
                db.update('orders', orderId, { deliveryStatus: 'Delivered', collectionStatus: 'Collected' });
                ui.toast('Order marked as delivered!');
                app.render();
            },

            deleteItem(collection, id) {
                if(confirm('Are you sure you want to delete this record?')) {
                    db.delete(collection, id);
                    app.render();
                }
            },

            exportData() {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db.data));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `luku_backup_${new Date().toISOString().split('T')[0]}.json`);
                dlAnchorElem.click();
            },
            
            importData(e) {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if(parsed && parsed.orders) {
                            localStorage.setItem(DB_KEY, JSON.stringify(parsed));
                            db.init();
                            ui.toast('Data restored successfully!');
                            app.render();
                        } else {
                            throw new Error('Invalid format');
                        }
                    } catch(err) {
                        ui.toast('Invalid backup file.', 'error');
                    }
                };
                reader.readAsText(file);
            },

            downloadPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(20);
                doc.text("Luku Designs - Business Report", 20, 20);
                
                doc.setFontSize(12);
                doc.text(`Generated: ${new Date().toLocaleString()}`, 20, 30);
                
                let profit = 0, rev = 0;
                db.get('orders').forEach(o => { rev += o.totalValue; profit += (o.sellingPrice - o.buyingPrice)*o.quantity; });
                
                doc.text(`Total Revenue: KES ${rev}`, 20, 50);
                doc.text(`Total Profit: KES ${profit}`, 20, 60);
                doc.text(`Total Customers: ${db.get('customers').length}`, 20, 70);
                doc.text(`Pending Deliveries: ${db.get('orders').filter(o=>o.deliveryStatus==='Pending Delivery').length}`, 20, 80);
                
                doc.save("Luku_Designs_Report.pdf");
                ui.toast('PDF Generated Successfully');
            }
        };

        // --- 7. Main App Initialization & Charting ---
        const app = {
            currentUser: null,
            init() {
                db.init();
                generatePWA();

                // Theme Initialization
                if (db.data.settings.darkMode) {
                    document.documentElement.classList.add('dark');
                }
                
                document.getElementById('theme-toggle').addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark');
                    db.data.settings.darkMode = document.documentElement.classList.contains('dark');
                    db.save();
                    this.renderCharts(); // Re-render to update chart colors
                });

                // Setup Auth
                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const u = document.getElementById('username').value.toLowerCase();
                    const p = document.getElementById('password').value.toLowerCase();
                    
                    if ((u === 'admin' && p === 'admin') || (u === 'staff' && p === 'staff')) {
                        this.currentUser = { username: u, role: u };
                        document.getElementById('auth-screen').classList.add('hidden');
                        document.getElementById('app-screen').classList.remove('hidden');
                        document.getElementById('user-role-display').textContent = `${u} Account`;
                        this.navigate('dashboard');
                    } else {
                        ui.toast('Invalid credentials. Use admin/admin or staff/staff', 'error');
                    }
                });
            },
            
            navigate(viewId) {
                if(navItems.find(i => i.id === viewId).adminOnly && this.currentUser.role !== 'admin') {
                    return ui.toast('Admin access required.', 'error');
                }
                ui.currentView = viewId;
                this.render();
            },
            
            render() {
                renderNav();
                const container = document.getElementById('view-container');
                if (views[ui.currentView]) {
                    container.innerHTML = views[ui.currentView]();
                    lucide.createIcons({ root: container });
                    if(ui.currentView === 'dashboard' || ui.currentView === 'reports') {
                        setTimeout(() => this.renderCharts(), 100);
                    }
                }
            },
            
            renderCharts() {
                const isDark = document.documentElement.classList.contains('dark');
                const textColor = isDark ? '#e5e7eb' : '#374151';
                const gridColor = isDark ? '#374151' : '#e5e7eb';
                
                Chart.defaults.color = textColor;
                Chart.defaults.borderColor = gridColor;

                // Dashboard Line Chart
                const dCanvas = document.getElementById('dashboardChart');
                if (dCanvas) {
                    const orders = db.get('orders');
                    // Group by date for last 7 days
                    const last7Days = [...Array(7)].map((_, i) => {
                        const d = new Date();
                        d.setDate(d.getDate() - i);
                        return d.toISOString().split('T')[0];
                    }).reverse();

                    const revData = last7Days.map(date => {
                        return orders.filter(o => o.date.startsWith(date))
                                     .reduce((sum, o) => sum + o.totalValue, 0);
                    });

                    new Chart(dCanvas, {
                        type: 'line',
                        data: {
                            labels: last7Days.map(d => d.substr(5)),
                            datasets: [{
                                label: 'Revenue (KES)',
                                data: revData,
                                borderColor: '#2563eb',
                                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }

                // Reports Bar Chart
                const cCanvas = document.getElementById('categoryChart');
                if(cCanvas) {
                    const categories = db.get('categories');
                    const orders = db.get('orders');
                    
                    const catSales = categories.map(cat => {
                        return orders.filter(o => o.productCategory === cat).reduce((sum, o) => sum + o.quantity, 0);
                    });

                    new Chart(cCanvas, {
                        type: 'bar',
                        data: {
                            labels: categories,
                            datasets: [{
                                label: 'Items Sold',
                                data: catSales,
                                backgroundColor: ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b']
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            },

            logout() {
                this.currentUser = null;
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('login-form').reset();
            }
        };

        // Boot
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
