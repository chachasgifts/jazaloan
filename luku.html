<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luku Designs Management</title>
    
    <link id="manifest-link" rel="manifest" href="">
    <meta name="theme-color" content="#1e3a8a">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 
                            50: '#eff6ff', 
                            100: '#dbeafe', 
                            500: '#3b82f6', 
                            600: '#2563eb', 
                            700: '#1d4ed8', 
                            900: '#1e3a8a' 
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-enter { animation: modalEnter 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 1rem; border-radius: 0.75rem; background: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: flex; align-items: center; gap: 0.75rem; animation: slideInRight 0.25s cubic-bezier(0.16, 1, 0.3, 1); min-width: 280px; }
        .toast.dark { background: #1f2937; color: white; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-200 antialiased h-screen overflow-hidden flex flex-col">

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <div id="auth-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md modal-enter border border-gray-100 dark:border-gray-700">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i data-lucide="shopping-bag" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Luku Designs</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2">Business Management System</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username (admin / staff)</label>
                    <input type="text" id="username" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none" placeholder="Enter admin or staff" required autocomplete="username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password (admin / staff)</label>
                    <input type="password" id="password" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 outline-none" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-md">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden h-full flex flex-col md:flex-row">
        
        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex flex-col w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 h-full">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3">
                <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center shadow-md">
                    <i data-lucide="shopping-bag" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg text-gray-900 dark:text-white">Luku Designs</h2>
                    <p id="user-role-display" class="text-xs text-primary-600 dark:text-primary-400 font-bold uppercase tracking-wider"></p>
                </div>
            </div>
            
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="desktop-nav"></nav>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button id="theme-toggle" class="flex items-center gap-3 w-full px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    Toggle Theme
                </button>
                <button onclick="app.logout()" class="flex items-center gap-3 w-full px-3 py-2 mt-2 text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full bg-gray-50 dark:bg-gray-900 relative">
            <!-- Mobile Header -->
            <header class="md:hidden bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex justify-between items-center z-10 shadow-sm">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary-600 rounded-md flex items-center justify-center">
                        <i data-lucide="shopping-bag" class="text-white w-4 h-4"></i>
                    </div>
                    <h2 class="font-bold text-gray-900 dark:text-white">Luku Designs</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="mobile-theme-toggle" class="p-2 text-gray-500 dark:text-gray-400">
                        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button onclick="app.logout()" class="p-2 text-red-500 hover:text-red-600">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 relative">
                <!-- Content injected here -->
            </div>
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 pb-safe z-20 shadow-lg">
            <div class="flex justify-around items-center h-16 px-2" id="mobile-nav">
                <!-- Mobile nav injected here -->
            </div>
        </nav>
    </div>

    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/55 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto modal-enter p-6 relative">
            <button onclick="ui.closeModal()" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded-full transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const DB_KEY = 'luku_designs_db';
        
        const generateMockDate = (daysAgo) => {
            const date = new Date();
            date.setDate(date.getDate() - daysAgo);
            return date.toISOString();
        };

        const defaultData = {
            settings: { darkMode: false, lastBackup: null, milestoneLevel: 0 },
            customers: [
                { id: 'c1', name: 'Nelly Wanjiku', phone: '0712345678', tiktok: 'nelly_designs', category: 'Frequent Customer', totalOrders: 3, createdAt: generateMockDate(60) },
                { id: 'c2', name: 'Alvin Kiprop', phone: '0722998877', tiktok: 'alvin_thrift', category: 'Trusted Customer', totalOrders: 2, createdAt: generateMockDate(45) },
                { id: 'c3', name: 'Zahra Omar', phone: '0733554433', tiktok: 'zahrakuku', category: 'Normal', totalOrders: 1, createdAt: generateMockDate(5) }
            ],
            categories: ['Dresses', '2-Piece Sets', 'Kimonos', 'Jumpsuits'],
            products: [
                { id: 'p1', category: 'Dresses', name: 'Silk Slip Dress', buyingPrice: 500, sellingPrice: 1500, stock: 12 },
                { id: 'p2', category: '2-Piece Sets', name: 'Linen Lounge Set', buyingPrice: 800, sellingPrice: 2200, stock: 8 },
                { id: 'p3', category: 'Kimonos', name: 'Boho Floral Kimono', buyingPrice: 600, sellingPrice: 1800, stock: 15 },
                { id: 'p4', category: 'Jumpsuits', name: 'Velvet Evening Jumpsuit', buyingPrice: 1000, sellingPrice: 2800, stock: 4 }
            ],
            orders: [
                // Historic orders spread out over the past year to beautifully populate Weekly/Monthly/Yearly charts
                { 
                    id: 'o_old1', date: generateMockDate(320), 
                    customerId: 'c1', customerName: 'Nelly Wanjiku', customerPhone: '0712345678',
                    productId: 'p1', productName: 'Silk Slip Dress', productCategory: 'Dresses',
                    quantity: 2, sellingPrice: 1500, buyingPrice: 500, totalValue: 3000,
                    destination: 'Thika', courier: 'Super 2D', paid: 3000, balance: 0,
                    paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(315)
                },
                { 
                    id: 'o_old2', date: generateMockDate(150), 
                    customerId: 'c2', customerName: 'Alvin Kiprop', customerPhone: '0722998877',
                    productId: 'p2', productName: 'Linen Lounge Set', productCategory: '2-Piece Sets',
                    quantity: 1, sellingPrice: 2200, buyingPrice: 800, totalValue: 2200,
                    destination: 'Eldoret', courier: 'North Rift', paid: 2200, balance: 0,
                    paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(140)
                },
                { 
                    id: 'o_old3', date: generateMockDate(40), 
                    customerId: 'c1', customerName: 'Nelly Wanjiku', customerPhone: '0712345678',
                    productId: 'p4', productName: 'Velvet Evening Jumpsuit', productCategory: 'Jumpsuits',
                    quantity: 1, sellingPrice: 2800, buyingPrice: 1000, totalValue: 2800,
                    destination: 'Thika', courier: 'Super 2D', paid: 2800, balance: 0,
                    paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(38)
                },
                // Recent Orders (Within last week)
                { 
                    id: 'o1', date: generateMockDate(6), 
                    customerId: 'c1', customerName: 'Nelly Wanjiku', customerPhone: '0712345678',
                    productId: 'p1', productName: 'Silk Slip Dress', productCategory: 'Dresses',
                    quantity: 1, sellingPrice: 1500, buyingPrice: 500, totalValue: 1500,
                    destination: 'Thika', courier: 'Super 2D Sacco', paid: 1500, balance: 0,
                    paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(5)
                },
                { 
                    id: 'o2', date: generateMockDate(4), 
                    customerId: 'c2', customerName: 'Alvin Kiprop', customerPhone: '0722998877',
                    productId: 'p2', productName: 'Linen Lounge Set', productCategory: '2-Piece Sets',
                    quantity: 1, sellingPrice: 2200, buyingPrice: 800, totalValue: 2200,
                    destination: 'Eldoret', courier: 'North Rift Shuttle', paid: 1200, balance: 1000,
                    paymentStatus: 'Partially Paid', deliveryStatus: 'Pending Delivery', collectionStatus: 'Awaiting Collection', updatedAt: generateMockDate(4)
                },
                { 
                    id: 'o3', date: generateMockDate(2), 
                    customerId: 'c1', customerName: 'Nelly Wanjiku', customerPhone: '0712345678',
                    productId: 'p3', productName: 'Boho Floral Kimono', productCategory: 'Kimonos',
                    quantity: 2, sellingPrice: 1800, buyingPrice: 600, totalValue: 3600,
                    destination: 'Nairobi CBD', courier: 'Rider Direct', paid: 3600, balance: 0,
                    paymentStatus: 'Fully Paid', deliveryStatus: 'Delivered', collectionStatus: 'Collected', updatedAt: generateMockDate(2)
                },
                { 
                    id: 'o4', date: generateMockDate(1), 
                    customerId: 'c3', customerName: 'Zahra Omar', customerPhone: '0733554433',
                    productId: 'p4', productName: 'Velvet Evening Jumpsuit', productCategory: 'Jumpsuits',
                    quantity: 1, sellingPrice: 2800, buyingPrice: 1000, totalValue: 2800,
                    destination: 'Mombasa', courier: 'Coast Bus', paid: 2800, balance: 0,
                    paymentStatus: 'Fully Paid', deliveryStatus: 'Pending Delivery', collectionStatus: 'Awaiting Collection', updatedAt: generateMockDate(1)
                }
            ],
            destinations: ['Thika', 'Eldoret', 'Nairobi CBD', 'Mombasa', 'Kisumu', 'Nakuru'],
            couriers: ['Super 2D Sacco', 'North Rift Shuttle', 'Rider Direct', 'Coast Bus'],
            goals: [
                { id: 'g1', type: 'Revenue', target: 50000, title: 'Monthly Revenue Goal' }
            ]
        };

        const db = {
            data: {},
            init() {
                const stored = localStorage.getItem(DB_KEY);
                this.data = stored ? JSON.parse(stored) : defaultData;
                this.save();
            },
            save() {
                localStorage.setItem(DB_KEY, JSON.stringify(this.data));
                lucide.createIcons();
            },
            get(collection) { return this.data[collection] || []; },
            add(collection, item) {
                item.id = Date.now().toString() + Math.random().toString(36).substring(2, 7);
                item.createdAt = new Date().toISOString();
                this.data[collection].push(item);
                this.save();
                return item;
            },
            update(collection, id, updates) {
                const index = this.data[collection].findIndex(i => i.id === id);
                if (index > -1) {
                    this.data[collection][index] = { 
                        ...this.data[collection][index], 
                        ...updates, 
                        updatedAt: new Date().toISOString() 
                    };
                    this.save();
                }
            },
            delete(collection, id) {
                this.data[collection] = this.data[collection].filter(i => i.id !== id);
                this.save();
            }
        };

        const ui = {
            currentView: 'dashboard',
            dashboardChartTab: 'daily', // Options: 'daily', 'weekly', 'monthly', 'quarterly', 'yearly'
            
            toast(message, type = 'success') {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                const isDark = document.documentElement.classList.contains('dark');
                
                let borderCol = 'border-green-500';
                let iconName = 'check-circle';
                let iconColor = 'text-green-500';
                
                if (type === 'error') {
                    borderCol = 'border-red-500';
                    iconName = 'alert-triangle';
                    iconColor = 'text-red-500';
                } else if (type === 'info') {
                    borderCol = 'border-blue-500';
                    iconName = 'info';
                    iconColor = 'text-blue-500';
                }

                t.className = `toast ${isDark ? 'dark' : ''} border-l-4 ${borderCol}`;
                t.innerHTML = `
                    <i data-lucide="${iconName}" class="${iconColor} w-5 h-5 flex-shrink-0"></i>
                    <span class="text-sm font-semibold">${message}</span>
                `;
                container.appendChild(t);
                lucide.createIcons({root: t});
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translateX(100%)';
                    setTimeout(() => t.remove(), 300);
                }, 3500);
            },
            openModal(html) {
                document.getElementById('modal-body').innerHTML = html;
                document.getElementById('modal-overlay').classList.remove('hidden');
                lucide.createIcons();
            },
            closeModal() {
                document.getElementById('modal-overlay').classList.add('hidden');
            },
            formatMoney(amount) {
                return new Intl.NumberFormat('en-KE', { style: 'currency', currency: 'KES', minimumFractionDigits: 0 }).format(amount);
            },
            formatDate(isoString) {
                if(!isoString) return 'N/A';
                return new Date(isoString).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            },
            celebrate() {
                confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#2563eb', '#10b981', '#ffffff', '#1d4ed8'] });
            },
            setDashboardTab(tabName) {
                this.dashboardChartTab = tabName;
                app.render();
            }
        };

        const navItems = [
            { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard', adminOnly: false },
            { id: 'orders', icon: 'shopping-cart', label: 'Orders', adminOnly: false },
            { id: 'deliveries', icon: 'truck', label: 'Deliveries', adminOnly: false },
            { id: 'customers', icon: 'users', label: 'Customers', adminOnly: false },
            { id: 'inventory', icon: 'package', label: 'Inventory', adminOnly: false },
            { id: 'reports', icon: 'bar-chart-3', label: 'Reports', adminOnly: false },
            { id: 'settings', icon: 'settings', label: 'Settings', adminOnly: true }
        ];

        const renderNav = () => {
            const role = app.currentUser ? app.currentUser.role : 'staff';
            const desktopNav = document.getElementById('desktop-nav');
            const mobileNav = document.getElementById('mobile-nav');
            
            let dHtml = '', mHtml = '';
            navItems.forEach(item => {
                if (item.adminOnly && role !== 'admin') return;
                
                const activeClassesDesktop = ui.currentView === item.id 
                    ? 'bg-primary-50 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 border-l-4 border-primary-600' 
                    : 'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800';
                    
                const activeClassesMobile = ui.currentView === item.id 
                    ? 'text-primary-600 dark:text-primary-400 font-bold scale-105' 
                    : 'text-gray-500 dark:text-gray-400';
                
                dHtml += `
                    <a href="#" onclick="app.navigate('${item.id}'); return false;" class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium transition-all ${activeClassesDesktop}">
                        <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        <span class="text-sm">${item.label}</span>
                    </a>
                `;
                
                if (['dashboard', 'orders', 'deliveries', 'customers', 'reports'].includes(item.id)) {
                    mHtml += `
                        <a href="#" onclick="app.navigate('${item.id}'); return false;" class="flex flex-col items-center justify-center w-full py-1 transition-all ${activeClassesMobile}">
                            <i data-lucide="${item.icon}" class="w-5.5 h-5.5 mb-0.5"></i>
                            <span class="text-[9px] font-medium tracking-tight">${item.label}</span>
                        </a>
                    `;
                }
            });

            desktopNav.innerHTML = dHtml;
            mobileNav.innerHTML = mHtml;
            lucide.createIcons();
        };

        const generateChartBuckets = (timeframe) => {
            const today = new Date();
            const buckets = [];
            
            if (timeframe === 'daily') {
                for(let i=6; i>=0; i--) {
                    const d = new Date(today); d.setDate(today.getDate() - i);
                    const start = new Date(d.setHours(0,0,0,0));
                    const end = new Date(d.setHours(23,59,59,999));
                    buckets.push({ label: d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}), start, end });
                }
            } else if (timeframe === 'weekly') {
                for(let i=4; i>=0; i--) {
                    const start = new Date(today);
                    start.setDate(today.getDate() - (today.getDay() || 7) + 1 - (i*7));
                    start.setHours(0,0,0,0);
                    const end = new Date(start);
                    end.setDate(start.getDate() + 6);
                    end.setHours(23,59,59,999);
                    buckets.push({ label: `Wk ${start.getDate()} ${start.toLocaleString('default',{month:'short'})}`, start, end });
                }
            } else if (timeframe === 'monthly') {
                for(let i=5; i>=0; i--) {
                    const start = new Date(today.getFullYear(), today.getMonth() - i, 1);
                    const end = new Date(today.getFullYear(), today.getMonth() - i + 1, 0, 23, 59, 59, 999);
                    buckets.push({ label: start.toLocaleString('default',{month:'short', year:'2-digit'}), start, end });
                }
            } else if (timeframe === 'quarterly') {
                for(let i=3; i>=0; i--) {
                    const currentQ = Math.floor(today.getMonth() / 3);
                    const start = new Date(today.getFullYear(), (currentQ - i) * 3, 1);
                    const end = new Date(today.getFullYear(), (currentQ - i) * 3 + 3, 0, 23, 59, 59, 999);
                    buckets.push({ label: `Q${Math.floor(start.getMonth()/3)+1} '${start.getFullYear().toString().slice(-2)}`, start, end });
                }
            } else if (timeframe === 'yearly') {
                for(let i=3; i>=0; i--) {
                    const start = new Date(today.getFullYear() - i, 0, 1);
                    const end = new Date(today.getFullYear() - i, 11, 31, 23, 59, 59, 999);
                    buckets.push({ label: start.getFullYear().toString(), start, end });
                }
            }
            return buckets;
        };

        const renderSVGRevenueGraph = (containerId, timeframe) => {
            const container = document.getElementById(containerId);
            if (!container) return;

            const isDark = document.documentElement.classList.contains('dark');
            const orders = db.get('orders');
            
            // Generate buckets based on timeframe
            const buckets = generateChartBuckets(timeframe);

            // Map and Aggregate data for Revenue & Profit
            const chartData = buckets.map(bucket => {
                const bucketOrders = orders.filter(o => {
                    const d = new Date(o.date);
                    return d >= bucket.start && d <= bucket.end;
                });
                
                const revenue = bucketOrders.reduce((sum, curr) => sum + curr.totalValue, 0);
                const profit = bucketOrders.reduce((sum, curr) => sum + ((curr.sellingPrice - curr.buyingPrice) * curr.quantity), 0);
                
                return { label: bucket.label, revenue, profit };
            });

            const revenues = chartData.map(d => d.revenue);
            const maxRev = Math.max(...revenues, 5000); // Guard division by zero
            const gridMax = Math.ceil(maxRev / 1000) * 1000;

            // Dimensions
            const width = 600;
            const height = 220;
            const paddingLeft = 50;
            const paddingRight = 20;
            const paddingTop = 20;
            const paddingBottom = 30;

            const graphWidth = width - paddingLeft - paddingRight;
            const graphHeight = height - paddingTop - paddingBottom;

            const getX = (index) => paddingLeft + (index / (chartData.length - 1)) * graphWidth;
            const getY = (val) => paddingTop + graphHeight - (val / gridMax) * graphHeight;

            // Generate Horizontal grid lines & Y labels
            let yGridHtml = '';
            const steps = 4;
            for (let i = 0; i <= steps; i++) {
                const currentVal = (gridMax / steps) * i;
                const yCoord = getY(currentVal);
                yGridHtml += `
                    <line x1="${paddingLeft}" y1="${yCoord}" x2="${width - paddingRight}" y2="${yCoord}" stroke="${isDark ? '#374151' : '#e5e7eb'}" stroke-dasharray="3,3" />
                    <text x="${paddingLeft - 8}" y="${yCoord + 4}" text-anchor="end" class="text-[10px]" fill="${isDark ? '#9ca3af' : '#6b7280'}">${currentVal >= 1000 ? (currentVal/1000) + 'k' : currentVal}</text>
                `;
            }

            // X Labels
            let xLabelsHtml = '';
            chartData.forEach((d, idx) => {

                                        <tr>
                                            <th class="px-4 py-3">Catalog Item</th>
                                            <th class="px-4 py-3">Category</th>
                                            <th class="px-4 py-3">Cost Price</th>
                                            <th class="px-4 py-3">Retail Price</th>
                                            <th class="px-4 py-3">Active Stock</th>
                                            <th class="px-4 py-3">Est. Valuation</th>
                                            <th class="px-4 py-3 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700/60">
                                        ${products.map(p => {
                                            const valuation = p.buyingPrice * p.stock;
                                            return `
                                                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/20 text-xs transition-colors">
                                                    <td class="px-4 py-3.5 font-bold text-gray-900 dark:text-white">${p.name}</td>
                                                    <td class="px-4 py-3.5">${p.category}</td>
                                                    <td class="px-4 py-3.5">${ui.formatMoney(p.buyingPrice)}</td>
                                                    <td class="px-4 py-3.5 font-semibold text-primary-600 dark:text-primary-400">${ui.formatMoney(p.sellingPrice)}</td>
                                                    <td class="px-4 py-3.5">
                                                        <span class="px-2.5 py-1 rounded-lg font-bold ${p.stock <= 4 ? 'bg-red-50 text-red-600 dark:bg-red-950/30 dark:text-red-400' : 'bg-emerald-50 text-emerald-600 dark:bg-emerald-950/30 dark:text-emerald-400'}">${p.stock} units</span>
                                                    </td>
                                                    <td class="px-4 py-3.5 font-bold">${ui.formatMoney(valuation)}</td>
                                                    <td class="px-4 py-3.5 text-right">
                                                        <button onclick="actions.openAdjustStockModal('${p.id}')" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg text-[10px] font-bold transition-colors flex items-center gap-1 inline-flex">
                                                            <i data-lucide="edit-2" class="w-3 h-3"></i> Edit Stock
                                                        </button>
                                                    </td>
                                                </tr>
                                            `;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            },
            settings() {
                return `
                    <div class="fade-in space-y-6 max-w-2xl mx-auto">
                        <div>
                            <h1 class="text-2xl font-black">Admin Configurations</h1>
                            <p class="text-sm text-gray-500 font-medium">Manage server-side backups, backups and danger recovery options</p>
                        </div>
                        
                        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="database" class="text-primary-600"></i> Backup & Persistence</h3>
                            <div class="flex flex-wrap gap-4">
                                <button onclick="actions.exportData()" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold transition-colors">
                                    <i data-lucide="download" class="w-4 h-4"></i> Export Archive JSON
                                </button>
                                <label class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold cursor-pointer transition-colors border border-gray-200 dark:border-gray-600">
                                    <i data-lucide="upload" class="w-4 h-4"></i> Restore Database
                                    <input type="file" class="hidden" accept=".json" onchange="actions.importData(event)">
                                </label>
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        const actions = {
            // ... Custom stock editing modal directly from Reports
            openAdjustStockModal(id) {
                const product = db.get('products').find(p => p.id === id);
                if (!product) return;
                
                ui.openModal(`
                    <div class="text-center mb-6">
                        <div class="w-14 h-14 bg-indigo-100 dark:bg-indigo-950/40 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="package" class="w-7 h-7"></i>
                        </div>
                        <h3 class="text-lg font-extrabold text-gray-900 dark:text-white">Adjust Physical Stock</h3>
                        <p class="text-xs text-gray-500 mt-1">Item: <strong class="text-gray-800 dark:text-gray-200">${product.name}</strong></p>
                    </div>
                    
                    <form id="adjust-stock-form" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Correct Current Quantity</label>
                            <input type="number" name="newStock" value="${product.stock}" min="0" required class="w-full text-center text-xl font-bold mt-1.5 p-4 border rounded-xl dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none">
                            <p class="text-[10px] text-gray-400 mt-2 text-center">Note: Orders automatically deduct this value. Only adjust if conducting physical inventory checks.</p>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-3.5 rounded-xl font-bold mt-4 shadow-md transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="check" class="w-4 h-4"></i> Save Stock Update
                        </button>
                    </form>
                `);

                document.getElementById('adjust-stock-form').onsubmit = (e) => {
                    e.preventDefault();
                    const newStock = Number(new FormData(e.target).get('newStock'));
                    
                    db.update('products', id, { stock: newStock });
                    ui.closeModal();
                    ui.toast(`Stock for ${product.name} updated to ${newStock} units.`);
                    app.render();
                };
            },

            openAddOrderModal() {
                const customers = db.get('customers');
                const products = db.get('products').filter(p => p.stock > 0);
                
                if(customers.length === 0) return ui.toast('Please register at least one Customer first.', 'info');
                if(products.length === 0) return ui.toast('Please verify your stock catalog is not empty.', 'info');

                ui.openModal(`
                    <h3 class="text-lg font-extrabold mb-4">Create New Client Order</h3>
                    <p class="text-xs text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-950/30 p-2 rounded-lg mb-4 border border-emerald-100 dark:border-emerald-800 font-medium">
                        <i data-lucide="info" class="w-3.5 h-3.5 inline"></i> Creating an order will dynamically deduct the item quantity from your active store inventory.
                    </p>
                    <form id="add-order-form" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Customer Link</label>
                            <select name="customerId" required class="w-full mt-1.5 p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none">
                                ${customers.map(c => `<option value="${c.id}">${c.name} (${c.phone})</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Inventory Product Item</label>
                            <select name="productId" required id="product-select" class="w-full mt-1.5 p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none">
                                ${products.map(p => `<option value="${p.id}" data-price="${p.sellingPrice}">${p.name} (Stock: ${p.stock}) - ${ui.formatMoney(p.sellingPrice)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Order Quantity</label>
                                <input type="number" name="quantity" id="order-qty" value="1" min="1" required class="w-full mt-1.5 p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Initial Payment (KES)</label>
                                <input type="number" name="paid" value="0" min="0" required class="w-full mt-1.5 p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Destination Town</label>
                                <input type="text" name="destination" required class="w-full mt-1.5 p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none" list="dest-list">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Courier / Bus Company</label>
                                <input type="text" name="courier" required class="w-full mt-1.5 p-3 border rounded-xl dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 outline-none">
                            </div>
                        </div>
                        <datalist id="dest-list">${db.get('destinations').map(d => `<option value="${d}">`).join('')}</datalist>
                        
                        <div class="bg-gray-50 dark:bg-gray-900 p-4 rounded-xl border border-gray-150 dark:border-gray-700 text-sm flex justify-between items-center">
                            <span class="font-bold text-gray-500">Total Valuation Charge:</span>
                            <strong id="order-total" class="text-xl text-primary-600 dark:text-primary-400 font-extrabold">KSh 0</strong>
                        </div>
                        <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white p-3.5 rounded-xl font-bold mt-4 shadow-md transition-colors">
                            Confirm and Place Order
                        </button>
                    </form>
                `);

                const pSelect = document.getElementById('product-select');
                const qInput = document.getElementById('order-qty');
                const tDisp = document.getElementById('order-total');
                
                const updateTotal = () => {
                    const price = Number(pSelect.options[pSelect.selectedIndex].dataset.price);
                    tDisp.innerText = ui.formatMoney(price * Number(qInput.value));
                };
                pSelect.onchange = updateTotal;
                qInput.oninput = updateTotal;
                updateTotal();

                document.getElementById('add-order-form').onsubmit = (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    
                    const prod = products.find(p => p.id === fd.get('productId'));
                    const cust = customers.find(c => c.id === fd.get('customerId'));
                    const qty = Number(fd.get('quantity'));
                    const paid = Number(fd.get('paid'));
                    
                    if(qty > prod.stock) return ui.toast(`Only ${prod.stock} items left in stock.`, 'error');
                    
                    const totalValue = prod.sellingPrice * qty;
                    const balance = totalValue - paid;
                    const paymentStatus = balance <= 0 ? 'Fully Paid' : (paid > 0 ? 'Partially Paid' : 'Unpaid');
                    
                    const dest = fd.get('destination').trim();
                    let destList = db.get('destinations');
                    if(!destList.includes(dest)) {
                        destList.push(dest);
                        db.save();
                    }

                    db.add('orders', {
                        date: new Date().toISOString(),
                        customerId: cust.id, 
                        customerName: cust.name, 
                        customerPhone: cust.phone,
                        productId: prod.id, 
                        productName: prod.name, 
                        productCategory: prod.category,
                        quantity: qty, 
                        sellingPrice: prod.sellingPrice, 
                        buyingPrice: prod.buyingPrice, 
                        totalValue,
                        destination: dest, 
                        courier: fd.get('courier').trim(),
                        paid, 
                        balance, 
                        paymentStatus,
                        deliveryStatus: 'Pending Delivery', 
                        collectionStatus: 'Awaiting Collection'
                    });

                    // THIS AUTOMATICALLY DEDUCTS THE STOCK!
                    db.update('products', prod.id, { stock: prod.stock - qty });
                    db.update('customers', cust.id, { totalOrders: (cust.totalOrders || 0) + 1 });

                    ui.closeModal();
                    ui.toast('Client transaction logged and stock updated successfully!');
                    app.render();
                };
            },

            deleteOrder(orderId) {
                ui.openModal(`
                    <div class="text-center p-4">
                        <div class="w-14 h-14 bg-red-100 dark:bg-red-950/40 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="trash-2" class="w-7 h-7"></i>
                        </div>
                        <h3 class="text-lg font-extrabold text-gray-900 dark:text-white mb-2">Delete Order Record?</h3>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mb-6">Are you sure? This operation will remove the order and automatically **restore the items back into inventory stock**.</p>
                        <div class="flex gap-3 justify-center">
                            <button onclick="ui.closeModal()" class="px-5 py-2.5 bg-gray-100 dark:bg-gray-700 font-bold rounded-xl text-xs transition-colors">Cancel</button>
                            <button onclick="actions.confirmDeleteOrder('${orderId}')" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl text-xs transition-colors shadow-md">Yes, Restore Stock & Delete</button>
                        </div>
                    </div>
                `);
            },

            confirmDeleteOrder(orderId) {
                const order = db.get('orders').find(o => o.id === orderId);
                if (order) {
                    const product = db.get('products').find(p => p.id === order.productId);
                    if (product) {
                        db.update('products', product.id, { stock: product.stock + order.quantity });
                    }
                    db.delete('orders', orderId);
                    ui.toast('Order deleted and stock has been restored.');
                }
                ui.closeModal();
                app.render();
            },

            downloadPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                const orders = db.get('orders');
                const products = db.get('products');
                const customers = db.get('customers');

                let rev = 0, cogs = 0;
                orders.forEach(o => { rev += o.totalValue; cogs += (o.buyingPrice * o.quantity); });
                const profit = rev - cogs;

                doc.setFont("Helvetica", "bold");
                doc.setFontSize(22);
                doc.setTextColor(30, 58, 138); 
                doc.text("LUKU DESIGNS SYSTEM STATEMENT", 20, 24);

                doc.setFont("Helvetica", "normal");
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139);
                doc.text(`Generated on: ${new Date().toLocaleString()}`, 20, 32);
                doc.text(`Total Accounts: ${customers.length} | Catalog SKU Items: ${products.length}`, 20, 38);

                doc.setDrawColor(226, 232, 240);
                doc.line(20, 44, 190, 44);

                doc.setFont("Helvetica", "bold");
                doc.setFontSize(14);
                doc.setTextColor(15, 23, 42);
                doc.text("1. Executive Summary", 20, 54);

                doc.setFont("Helvetica", "normal");
                doc.setFontSize(11);
                doc.text(`A. Gross Sales Revenue:      KES ${rev.toLocaleString()}`, 25, 64);
                doc.text(`B. Cost of Goods Sold:       KES ${cogs.toLocaleString()}`, 25, 72);
                
                doc.setFont("Helvetica", "bold");
                doc.setTextColor(16, 185, 129); 
                doc.text(`C. Calculated Net Profit:    KES ${profit.toLocaleString()}`, 25, 80);

                doc.setFont("Helvetica", "normal");
                doc.setTextColor(15, 23, 42);
                doc.text(`D. Store Performance Margin:  ${rev > 0 ? Math.round((profit/rev)*100) : 0}%`, 25, 88);

                doc.setDrawColor(226, 232, 240);
                doc.line(20, 96, 190, 96);

                doc.setFont("Helvetica", "bold");
                doc.text("2. Product Catalog Breakdown", 20, 106);

                let yCoord = 118;
                doc.setFontSize(9);
                doc.setTextColor(100, 116, 139);
                doc.text("Product Item", 22, yCoord);
                doc.text("Category", 75, yCoord);
                doc.text("Stock", 115, yCoord);
                doc.text("Cost Price", 135, yCoord);
                doc.text("Valuation", 165, yCoord);
                
                doc.line(20, yCoord + 2, 190, yCoord + 2);
                yCoord += 10;

                doc.setFont("Helvetica", "normal");
                doc.setTextColor(15, 23, 42);
                
                products.forEach(p => {
                    if (yCoord < 280) {
                        doc.text(p.name.substring(0, 26), 22, yCoord);
                        doc.text(p.category, 75, yCoord);
                        doc.text(`${p.stock} units`, 115, yCoord);
                        doc.text(ui.formatMoney(p.buyingPrice), 135, yCoord);
                        doc.text(ui.formatMoney(p.buyingPrice * p.stock), 165, yCoord);
                        yCoord += 8;
                    }
                });
                
                doc.save(`Luku_Designs_Report_${new Date().toISOString().split('T')[0]}.pdf`);
                ui.toast("PDF Report Downloaded Successfully!", "success");
            }
        };

        const app = {
            currentUser: null,
            init() {
                db.init();
                this.setupTheme();
                this.setupAuth();
            },
            setupTheme() {
                const isDark = db.data.settings.darkMode;
                if(isDark) document.documentElement.classList.add('dark');
                
                const toggle = () => {
                    document.documentElement.classList.toggle('dark');
                    db.data.settings.darkMode = document.documentElement.classList.contains('dark');
                    db.save();
                    this.render(); // Re-render graphs for color scheme change
                };
                
                document.getElementById('theme-toggle').onclick = toggle;
                document.getElementById('mobile-theme-toggle').onclick = toggle;
            },
            setupAuth() {
                const storedAuth = sessionStorage.getItem('luku_auth');
                if (storedAuth) {
                    this.currentUser = JSON.parse(storedAuth);
                    this.showApp();
                }

                document.getElementById('login-form').onsubmit = (e) => {
                    e.preventDefault();
                    const user = document.getElementById('username').value.trim().toLowerCase();
                    const pass = document.getElementById('password').value;
                    
                    if ((user === 'admin' && pass === 'admin') || (user === 'staff' && pass === 'staff')) {
                        this.currentUser = { username: user, role: user };
                        sessionStorage.setItem('luku_auth', JSON.stringify(this.currentUser));
                        this.showApp();
                        ui.toast(`Welcome back, ${user}!`);
                    } else {
                        ui.toast('Invalid credentials. Use admin/admin or staff/staff.', 'error');
                    }
                };
            },
            showApp() {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-role-display').innerText = `${this.currentUser.role} Account`;
                this.render();
            },
            logout() {
                sessionStorage.removeItem('luku_auth');
                this.currentUser = null;
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('auth-screen').classList.add('flex');
            },
            navigate(view) {
                ui.currentView = view;
                this.render();
            },
            render() {
                renderNav();
                document.getElementById('view-container').innerHTML = views[ui.currentView]();
                
                // If rendering dashboard, initialize the SVG graph with the active timeframe tab
                if(ui.currentView === 'dashboard') {
                    renderSVGRevenueGraph('dashboardGraphContainer', ui.dashboardChartTab);
                }
                lucide.createIcons();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
